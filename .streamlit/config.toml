[theme]
# Un verde vibrante pero profesional (tipo Excel/Deloitte)
primaryColor = "#27AE60"          

# Fondo principal blanco puro para que resalten los gráficos
backgroundColor = "#FFFFFF"       

# Un verde muy pálido para los fondos de los sliders y expanders
secondaryBackgroundColor = "#F0FDF4" 

# Un gris muy oscuro (casi negro) para que el texto sea nítido
textColor = "#1E293B"             

# Tipografía moderna y limpia
font = "sans serif"
